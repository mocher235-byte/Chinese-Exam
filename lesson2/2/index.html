            // 內建魔音效合成器 (Web Audio API)
            const playMagicSound = (type) => {
                try {
                    const ctx = new (window.AudioContext || window.webkitAudioContext)();
                    const osc = ctx.createOscillator();
                    const gain = ctx.createGain();
                    osc.connect(gain);
                    gain.connect(ctx.destination);

                    if (type === 'correct') {
                        osc.type = 'triangle';
                        osc.frequency.setValueAtTime(523.25, ctx.currentTime); // C5
                        osc.frequency.setValueAtTime(659.25, ctx.currentTime + 0.1); // E5
                        osc.frequency.setValueAtTime(783.99, ctx.currentTime + 0.2); // G5
                        gain.gain.setValueAtTime(0.1, ctx.currentTime);
                        gain.gain.exponentialRampToValueAtTime(0.01, ctx.currentTime + 0.4);
                        osc.start();
                        osc.stop(ctx.currentTime + 0.4);
                    } else if (type === 'wrong') {
                        osc.type = 'sawtooth';
                        osc.frequency.setValueAtTime(220, ctx.currentTime); // A3
                        osc.frequency.setValueAtTime(147, ctx.currentTime + 0.15); // D3
                        gain.gain.setValueAtTime(0.1, ctx.currentTime);
                        gain.gain.exponentialRampToValueAtTime(0.01, ctx.currentTime + 0.4);
                        osc.start();
                        osc.stop(ctx.currentTime + 0.4);
                    } else if (type === 'spell') {
                        osc.type = 'sine';
                        osc.frequency.setValueAtTime(880, ctx.currentTime);
                        osc.frequency.exponentialRampToValueAtTime(1760, ctx.currentTime + 0.5);
                        gain.gain.setValueAtTime(0.08, ctx.currentTime);
                        gain.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + 0.5);
                        osc.start();
                        osc.stop(ctx.currentTime + 0.5);
                    }
                } catch (e) {
                    console.log('音效不可用', e);
                }
            };

            // 語音施法：唸出成語故事
            const speakIdiom = (word, text) => {
                if ('speechSynthesis' in window) {
                    window.speechSynthesis.cancel();
                    if (ttsActive === word) {
                        setTtsActive(null);
                        return;
                    }
                    const utterance = new SpeechSynthesisUtterance(`${word}。典故：${text}`);
                    utterance.lang = 'zh-TW';
                    utterance.rate = 0.95;
                    utterance.onend = () => setTtsActive(null);
                    setTtsActive(word);
                    window.speechSynthesis.speak(utterance);
                    playMagicSound('spell');
                }
            };

                                    <div className="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-8">
                                        {filteredIdioms.map((idiom, idx) => (
                                            <div key={idx} className="bg-slate-950 border border-slate-800/80 rounded-[2.2rem] p-6 md:p-8 flex flex-col justify-between hover:bg-slate-900/40 transition-all duration-500 magic-glow-hover relative group">
                                                <div className="space-y-4">
                                                    {/* 卡片標題區域 */}
                                                    <div className="flex justify-between items-start">
                                                        <div className="space-y-1">
                                                            <div className="flex items-center gap-2">
                                                                <span className="text-[10px] font-black bg-yellow-500/10 text-yellow-500 border border-yellow-500/20 px-2.5 py-0.5 rounded-full">
                                                                    {idiom.categoryName}
                                                                </span>
                                                                <span className="text-[10px] font-bold text-slate-500">
                                                                    {idiom.dynasty} · {idiom.characters}
                                                                </span>
                                                            </div>
                                                            {}
                                                            <h4 
                                                                onClick={() => window.open(`https://www.youtube.com/results?search_query=成語故事+${idiom.word}`, '_blank')}
                                                                className="text-2xl md:text-3xl font-black text-white hover:text-yellow-400 cursor-pointer transition-colors flex items-center gap-2"
                                                                title="點擊開啟 YouTube 觀看成語故事"
                                                            >
                                                                {idiom.word}
                                                                <Icon name="play" className="w-4 h-4 text-yellow-500/80 inline-block opacity-0 group-hover:opacity-100 transition-opacity" />
                                                            </h4>
                                                            <p className="text-xs text-slate-400/80 tracking-widest leading-none font-bold italic">{idiom.zhuyin}</p>
                                                        </div>
                                                        <button 
                                                            onClick={() => speakIdiom(idiom.word, idiom.story)}
                                                            className={`p-3 rounded-2xl border ${ttsActive === idiom.word ? 'bg-yellow-500 border-yellow-500 text-slate-950 animate-pulse' : 'bg-slate-900 border-slate-800 text-yellow-500 hover:bg-yellow-500/10'} transition-all`}
                                                            title="語音導師朗讀故事"
                                                        >
                                                            <Icon name={ttsActive === idiom.word ? "volume-2" : "audio-lines"} className="w-4 h-4" />
                                                        </button>
                                                    </div>

                                                    {/* 成語典故詳細故事 */}
                                                    <div className="space-y-3">
                                                        <div className="p-4 bg-slate-900/40 rounded-2xl border border-slate-800/60">
                                                            <h5 className="text-xs text-yellow-500/80 font-black mb-1 flex items-center gap-1.5">
                                                                <Icon name="scroll" className="w-3 h-3" /> 歷史典故
                                                            </h5>
                                                            <p className="text-slate-300 text-xs md:text-sm leading-relaxed font-light">
                                                                {idiom.story}
                                                            </p>
                                                        </div>

                                                        {/* 釋義 */}
                                                        <div className="p-4 bg-yellow-500/[0.02] rounded-2xl border border-yellow-500/10">
                                                            <h5 className="text-xs text-yellow-400 font-black mb-1 flex items-center gap-1.5">
                                                                <Icon name="lightbulb" className="w-3 h-3" /> 意義延伸
                                                            </h5>
                                                            <p className="text-slate-300 text-xs md:text-sm leading-relaxed">
                                                                {idiom.meaning}
                                                            </p>
                                                        </div>
                                                    </div>
                                                </div>

                                                {/* 底部例句與對比 */}
                                                <div className="mt-6 pt-4 border-t border-slate-900 space-y-3">
                                                    <p className="text-xs text-slate-400 leading-relaxed italic">
                                                        <span className="text-slate-500 font-bold not-italic">例句 </span>
                                                        「{idiom.example}」
                                                    </p>
                                                    {idiom.contrast && (
                                                        <div className="text-[11px] text-slate-500 font-light bg-slate-900/30 p-2.5 rounded-xl border border-slate-900">
                                                            <span className="text-yellow-600 font-bold">考點解析：</span>{idiom.contrast}
                                                        </div>
                                                    )}
                                                </div>
                                            </div>
                                        ))}
                                    </div>
                                ) : (
                                    <div className="text-center py-20 bg-slate-950 rounded-[3rem] border border-slate-900 space-y-4">
                                        <Icon name="file-question" className="w-16 h-16 text-slate-600 mx-auto" />
                                        <h4 className="text-xl font-bold text-slate-300">未尋找到相符的成語咒語</h4>
                                        <p className="text-slate-500 text-sm">請嘗試修改關鍵字，例如「孔子」或「螢火蟲」。</p>
                                    </div>
                                )}
                            </div>
                        )}

                        {/* 試煉場 */}
                        {activeTab === 'trial' && (
                            <div className="max-w-4xl mx-auto px-4 animate-in fade-in slide-in-from-bottom-8 duration-500">
                                {quizResults ? (
                                    // 結算畫面
                                    <div className="bg-slate-950 border border-yellow-500/20 rounded-[3rem] p-6 md:p-12 text-center space-y-10 shadow-2xl relative overflow-hidden magic-glow">
                                        <div className="absolute -top-24 -left-24 w-64 h-64 bg-yellow-500/5 rounded-full blur-3xl"></div>
                                        
                                        <div className="space-y-3">
                                            <div className="inline-flex p-5 bg-yellow-500/10 rounded-full border border-yellow-500/20 mb-2">
                                                <Icon name={score >= 80 ? "crown" : "award"} className="w-12 h-12 text-yellow-500" />
                                            </div>
                                            <h3 className="text-4xl font-black text-white tracking-tight font-magic">魔法試煉結算</h3>
                                            <p className="text-slate-400 text-sm">你已突破金名魔法學院所有 20 層成語考驗</p>
                                        </div>
                                        
                                        {/* 分數與統計 */}
                                        <div className="grid grid-cols-1 sm:grid-cols-3 gap-6 max-w-2xl mx-auto">
                                            <div className="bg-slate-900/40 p-6 rounded-2xl border border-slate-800">
                                                <p className="text-slate-500 text-[10px] font-black uppercase tracking-wider mb-1">魔法契合度</p>
                                                <p className={`text-4xl font-black ${score >= 80 ? 'text-yellow-400' : 'text-orange-400'}`}>{score}分</p>
                                            </div>
                                            <div className="bg-slate-900/40 p-6 rounded-2xl border border-slate-800">
                                                <p className="text-slate-500 text-[10px] font-black uppercase tracking-wider mb-1">答對題數</p>
                                                <p className="text-4xl font-black text-green-400">{fullQuizData.length - wrongAnswers.length} 題</p>
                                            </div>
                                            <div className="bg-slate-900/40 p-6 rounded-2xl border border-slate-800">
                                                <p className="text-slate-500 text-[10px] font-black uppercase tracking-wider mb-1">失誤次數</p>
                                                <p className={`text-4xl font-black ${wrongAnswers.length === 0 ? 'text-green-400' : 'text-red-400'}`}>{wrongAnswers.length} 題</p>
                                            </div>
                                        </div>

                                        {/* 弱點羊皮紙 (錯題解析) */}
                                        {wrongAnswers.length > 0 && (
                                            <div className="text-left bg-slate-900/30 p-6 rounded-[2rem] border border-red-500/10 max-w-3xl mx-auto">
                                                <h4 className="text-red-400 font-bold text-lg mb-4 flex items-center gap-2">
                                                    <Icon name="sparkles" className="w-5 h-5 text-red-500" /> 魔法盲點解析（弱點偵測）
                                                </h4>
                                                <div className="space-y-4 max-h-[350px] overflow-y-auto pr-2 custom-scrollbar">
                                                    {wrongAnswers.map(w => (
                                                        <div key={w.id} className="p-5 bg-slate-950 border border-slate-900 rounded-2xl">
                                                            <div className="flex items-center gap-2 mb-2">
                                                                <span className="text-[10px] font-black text-red-400 bg-red-400/10 border border-red-400/20 px-2 py-0.5 rounded-full">第{w.id}題 · {w.type}</span>
                                                            </div>
                                                            <p className="text-slate-200 text-sm mb-3 font-bold">{w.q}</p>
                                                            <div className="text-xs space-y-1.5 text-slate-400">
                                                                <p className="text-red-400"><span className="font-bold">你的選擇：</span>{w.selected}</p>
                                                                <p className="text-green-400"><span className="font-bold">正確答案：</span>({w.ans}) {w.opts[w.ans - 1]}</p>
                                                                <p className="bg-slate-900 p-2.5 rounded-xl border border-slate-800 mt-2 text-slate-300 text-[11px] leading-relaxed">
                                                                    <span className="text-yellow-500 font-bold">導師指引：</span>{w.note}
                                                                </p>
                                                            </div>
                                                        </div>
                                                    ))}
                                                </div>
                                            </div>
                                        )}

                                        <div className="flex flex-col sm:flex-row gap-4 max-w-lg mx-auto pt-4">
                                            <button 
                                                onClick={() => setShowPrintModal(true)} 
                                                className="flex-1 py-4 bg-yellow-500 hover:bg-yellow-400 text-slate-950 rounded-2xl font-black text-base flex items-center justify-center gap-2 shadow-lg transition"
                                            >
                                                <Icon name="printer" className="w-5 h-5" /> 列印成果證書
                                            </button>
                                            <button 
                                                onClick={handleStartQuiz} 
                                                className="flex-1 py-4 border border-slate-700 hover:bg-slate-900 text-white rounded-2xl font-black text-base flex items-center justify-center gap-2 transition"
                                            >
                                                <Icon name="rotate-ccw" className="w-5 h-5" /> 重新挑戰試煉
                                            </button>
                                        </div>
                                    </div>
                                ) : (
                                    // 考試進行中 (單題問答)
                                    <div className="space-y-8">
                                        <div className="bg-slate-950 border border-slate-800 rounded-[2.5rem] p-6 md:p-8 space-y-6">
                                            {/* 進度與返回 */}
                                            <div className="flex justify-between items-center text-xs text-slate-400">
                                                <span className="font-bold text-yellow-500">成語特訓試煉場</span>
                                                <span className="font-mono bg-slate-900 px-3 py-1.5 rounded-full border border-slate-800">
                                                    挑戰進度: {currentQuizIndex + 1} / {fullQuizData.length}
                                                </span>
                                            </div>

                                            {/* 自訂進度條 */}
                                            <div className="w-full bg-slate-900 h-2 rounded-full overflow-hidden">
                                                <div 
                                                    className="bg-gradient-to-r from-amber-500 to-yellow-400 h-full transition-all duration-300"
                                                    style={{ width: `${((currentQuizIndex + 1) / fullQuizData.length) * 100}%` }}
                                                ></div>
                                            </div>

                                            {/* 當前問題 */}
                                            <div className="space-y-8 py-4">
                                                <div className="space-y-2">
                                                    <span className="text-[10px] font-black bg-yellow-500/10 text-yellow-500 border border-yellow-500/20 px-3 py-1 rounded-full uppercase">
                                                        {fullQuizData[currentQuizIndex].type}
                                                    </span>
                                                    <h4 className="text-xl md:text-2xl font-black text-slate-100 leading-relaxed">
                                                        {fullQuizData[currentQuizIndex].q}
                                                    </h4>
                                                </div>

                                                {/* 選項清單 */}
                                                <div className="grid grid-cols-1 md:grid-cols-2 gap-4">
                                                    {fullQuizData[currentQuizIndex].opts.map((opt, i) => {
                                                        const optNum = i + 1;
                                                        const isSelected = answers[fullQuizData[currentQuizIndex].id] === optNum;
                                                        return (
                                                            <div 
                                                                key={i}
                                                                onClick={() => { selectAnswer(fullQuizData[currentQuizIndex].id, optNum); playMagicSound('spell'); }}
                                                                className={`p-5 rounded-2xl border cursor-pointer transition duration-200 flex items-center justify-between group ${isSelected ? 'bg-yellow-500/10 border-yellow-500 text-yellow-400' : 'bg-slate-900/60 border-slate-800 hover:border-yellow-500/30 text-slate-300'}`}
                                                            >
                                                                <span className="font-bold text-sm md:text-base">{opt}</span>
                                                                <div className={`w-6 h-6 rounded-full border flex items-center justify-center transition-all ${isSelected ? 'border-yellow-500 bg-yellow-500 text-slate-950' : 'border-slate-700 group-hover:border-yellow-500/30'}`}>
                                                                    {isSelected && <Icon name="check" className="w-4 h-4 stroke-[3px]" />}
                                                                </div>
                                                            </div>
                                                        );
                                                    })}
                                                </div>
                                            </div>

                                            {/* 控制按鈕 */}
                                            <div className="flex justify-between items-center pt-4 border-t border-slate-900">
                                                <button 
                                                    onClick={prevQuestion} 
                                                    disabled={currentQuizIndex === 0}
                                                    className="px-5 py-3 text-sm font-bold border border-slate-800 hover:bg-slate-900 rounded-xl text-slate-400 hover:text-white disabled:opacity-20 transition"
                                                >
                                                    上一題
                                                </button>

                                                {currentQuizIndex < fullQuizData.length - 1 ? (
                                                    <button 
                                                        onClick={nextQuestion}
                                                        disabled={!answers[fullQuizData[currentQuizIndex].id]}
                                                        className="px-6 py-3 text-sm font-bold bg-yellow-500 hover:bg-yellow-400 disabled:opacity-20 disabled:pointer-events-none text-slate-950 rounded-xl transition shadow-lg"
                                                    >
                                                        下一題
                                                    </button>
                                                ) : (
                                                    <button 
                                                        onClick={submitSingleQuiz}
                                                        disabled={Object.keys(answers).length < fullQuizData.length}
                                                        className="px-8 py-3 text-sm font-black bg-white hover:bg-yellow-400 disabled:opacity-30 disabled:pointer-events-none text-slate-950 rounded-xl transition shadow-xl"
                                                    >
                                                        提交試煉結果 ({Object.keys(answers).length}/20)
                                                    </button>
                                                )}
                                            </div>
                                        </div>
                                    </div>
                                )}
                            </div>
                        )}
                    </main>

                    {/* 列印視窗：登錄試煉名字 */}
                    {showPrintModal && (
                        <div className="fixed inset-0 z-[100] flex items-center justify-center p-4 bg-black/95 backdrop-blur-md animate-in fade-in duration-300">
                            <div className="bg-slate-900 border border-yellow-500/20 p-8 md:p-12 rounded-[2.5rem] w-full max-w-md space-y-8 relative overflow-hidden magic-glow">
                                <div className="text-center space-y-3">
                                    <img src={logoBadgeUrl} alt="金名徽章" className="w-16 h-16 rounded-full mx-auto border border-yellow-500/50 object-cover" />
                                    <h3 className="text-2xl md:text-3xl font-black text-white font-magic">登錄金名魔法名冊</h3>
                                    <p className="text-slate-400 text-xs">請輸入閣下的魔法名字，我們將在羊皮紙證書上印記封印</p>
                                </div>
                                
                                <input 
                                    type="text" 
                                    placeholder="填寫試煉者姓名" 
                                    value={studentName}
                                    onChange={(e) => setStudentName(e.target.value)}
                                    className="w-full bg-slate-950 border-2 border-slate-800 rounded-2xl px-4 py-3.5 text-lg text-center text-white focus:outline-none focus:border-yellow-500 font-bold transition-all"
                                    autoFocus
                                />
                                
                                <div className="flex gap-4 pt-4">
                                    <button onClick={() => setShowPrintModal(false)} className="flex-1 py-3 text-slate-400 hover:text-white transition font-bold text-sm">取消</button>
                                    <button 
                                        onClick={() => { 
                                            setTimeout(() => {
                                                window.print(); 
                                                setShowPrintModal(false);
                                            }, 150);
                                        }}
                                        disabled={!studentName.trim()}
                                        className="flex-1 bg-yellow-500 hover:bg-yellow-400 disabled:opacity-20 disabled:cursor-not-allowed text-slate-950 py-3 rounded-2xl font-black text-sm shadow-md transition"
                                    >
                                        生成魔法證書
                                    </button>
                                </div>
                            </div>
                        </div>
                    )}

                    {/* A4 實體列印證書專用（畫面上隱藏，列印時強制顯示） */}
                    <div id="print-certificate" className="hidden font-serif">
                        <div className="cert-border flex flex-col justify-between">
                            <div className="text-center space-y-6">
                                <div className="flex justify-center items-center gap-4">
                                    <img src={logoMainUrl} alt="Logo" style={{ width: '80px', height: '80px', borderRadius: '50%', objectFit: 'cover' }} />
                                    <h1 className="text-6xl font-black tracking-widest text-slate-900">金名魔法學院</h1>
                                </div>
                                <div className="flex items-center justify-center gap-4">
                                    <div className="h-[2px] w-24 bg-slate-800"></div>
                                    <h2 className="text-3xl font-bold tracking-widest text-slate-700">成語精講試煉證書</h2>
                                    <div className="h-[2px] w-24 bg-slate-800"></div>
                                </div>
                            </div>
                            
                            <div className="my-10 space-y-8 text-2xl text-slate-800 leading-relaxed">
                                <p className="font-bold text-3xl">試煉魔法使：<span className="text-4xl font-black border-b-4 border-slate-900 px-6 mx-2">{studentName}</span></p>
                                <p>
                                    於西元 <span className="font-bold underline">{new Date().getFullYear()}</span> 年完成
                                    「高頻成語應用與辨析」之終極特訓試煉。本次共計挑戰 <span className="font-bold">20</span> 道難題，成功解開 <span className="font-bold text-blue-800 underline underline-offset-8">{fullQuizData.length - wrongAnswers.length}</span> 道成語魔法陣，獲得認證。
                                </p>
                                
                                <div className="bg-slate-50 p-8 rounded-3xl border-2 border-slate-200 text-center space-y-2">
                                    <p className="text-lg text-slate-500 font-bold tracking-widest">魔法評等得分</p>
                                    <p className="text-5xl font-black text-slate-950">{score} 分</p>
                                </div>

                                {wrongAnswers.length > 0 && (
                                    <div className="border-t border-slate-200 pt-6">
                                        <p className="font-bold text-red-900 text-xl mb-2">★ 待磨練之魔法盲點：</p>
                                        <div className="grid grid-cols-2 gap-4 text-sm">
                                            {wrongAnswers.slice(0, 6).map(w => (
                                                <div key={w.id} className="border-b border-slate-100 pb-1.5 flex justify-between">
                                                    <span>第{w.id}題 {w.type} </span>
                                                    <span className="font-bold text-slate-700">對應：({w.ans}) {w.opts[w.ans - 1].substring(0, 15)}...</span>
                                                </div>
                                            ))}
                                        </div>
                                    </div>
                                )}
                            </div>

                            <div className="flex justify-between items-end pt-6 border-t-2 border-slate-300">
                                <div className="text-xs text-slate-500 font-mono">
                                    <p>認證日期：{new Date().toLocaleDateString('zh-TW', { year: 'numeric', month: 'long', day: 'numeric' })}</p>
                                    <p>證書編號：GNA-{Math.random().toString(36).substr(2, 9).toUpperCase()}</p>
                                </div>
                                <div className="text-right">
                                    <p className="text-xl font-bold mb-6 text-slate-800">金名魔法學院 首席大魔法師</p>
                                    <div className="inline-block px-4 py-2 border-4 border-red-800/30 text-red-800/30 text-sm font-black tracking-widest rounded-full uppercase transform rotate-6">
                                        學院核可印章
                                    </div>
                                </div>
                            </div>
                        </div>
                    </div>

                    {/* 頁尾 */}
                    <footer className="bg-slate-950 border-t border-slate-900/80 py-8 text-center text-xs text-slate-500 relative">
                        <div className="max-w-7xl mx-auto px-4 space-y-3">
                            <p className="font-bold tracking-wider text-slate-400">金名魔法學院 · 升私中特訓班</p>
                            <p>© 2026 Golden Name Magic Academy. All Rights Reserved. 精選常考10大成語典故與全能試煉卷.</p>
                        </div>
                    </footer>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
